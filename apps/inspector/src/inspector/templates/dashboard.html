{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">System Health</h2>
<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for comp, status in inspectors.items() %}
    <div class="col">
        <div class="card h-100 {% if status.status == 'healthy' %}border-success{% else %}border-danger{% endif %}">
            <div class="card-header bg-transparent d-flex justify-content-between">
                <span class="fw-bold">{{ comp|title }}</span>
                {% if status.status == 'healthy' %}
                <span class="badge bg-success">Online</span>
                {% else %}
                <span class="badge bg-danger">Offline</span>
                {% endif %}
            </div>
            <div class="card-body">
                <pre class="small text-muted">{{ status|tojson(indent=2) }}</pre>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
