<table class="table table-hover table-striped mb-0 align-middle">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Timestamp</th>
            <th>User ID</th>
            <th>Role</th>
            <th>Content</th>
        </tr>
    </thead>
    <tbody>
        {% for row in rows %}
        <tr>
            <td><span class="text-muted">#{{ row.id }}</span></td>
            <td><small>{{ row.created_at[:19].replace('T', ' ') }}</small></td>
            <td><span class="badge bg-secondary">{{ row.user_id }}</span></td>
            <td>
                {% if row.role == 'user' %}
                    <span class="badge bg-primary">User</span>
                {% else %}
                    <span class="badge bg-success">Assistant</span>
                {% endif %}
            </td>
            <td>
                <div style="max-height: 100px; overflow-y: auto; font-size: 0.9em;">
                    {{ row.content }}
                </div>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="5" class="text-center p-4">No rows found in this table.</td></tr>
        {% endfor %}
    </tbody>
</table>
