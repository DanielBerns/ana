{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Database Browser</h2>
    <div class="d-flex gap-2">
        <select class="form-select" id="table-selector" name="table" hx-get="/browser/database/table" hx-target="#table-container">
            <option value="chat_history">Memory: Chat History</option>
            </select>
        <button class="btn btn-primary" hx-get="/browser/database/table" hx-include="#table-selector" hx-target="#table-container">Refresh</button>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0" id="table-container" hx-get="/browser/database/table?table=chat_history" hx-trigger="load">
        <div class="p-4 text-center text-muted">Loading Database Rows...</div>
    </div>
</div>
{% endblock %}
