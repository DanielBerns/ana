{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Store Browser</h2>
    <button class="btn btn-primary" hx-get="/browser/store/table" hx-target="#table-container">Refresh Data</button>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0" id="table-container" hx-get="/browser/store/table" hx-trigger="load">
        <div class="p-4 text-center text-muted">Loading Store Data...</div>
    </div>
</div>
{% endblock %}
