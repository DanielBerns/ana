services:
  # --- INFRASTRUCTURE ---
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ana_broker_v2
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: ana_v2
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "su-exec rabbitmq rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: ana_database_v2
    environment:
      POSTGRES_USER: ana_admin
      POSTGRES_PASSWORD: ana_password
      POSTGRES_DB: ana_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ana_admin -d ana_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- TIER 1: THE EDGE (Stateless APIs) ---
  edge-scraper:
    build: .
    container_name: ana_edge_scraper
    command: ["uv", "run", "uvicorn", "scraper.main:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"

  edge-store:
    build: .
    container_name: ana_edge_store
    command: ["uv", "run", "uvicorn", "store.main:app", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "8002:8002"

  edge-etl:
    build:
      context: .
      dockerfile: apps/edge/etl/Dockerfile
    container_name: ana_edge_etl
    command: ["uv", "run", "faststream", "run", "etl.main:app"]
    restart: on-failure
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/ana_v2
      - STORE_URL=http://edge-store:8002
    volumes:
      # Mount a local directory so the FileSystemExtractor can read local files!
      - ./local_data:/app/local_data
    depends_on:
      rabbitmq:
        condition: service_healthy

  # --- TIER 2: THE CORE (Event-Driven) ---
  core-interface:
    build: .
    container_name: ana_core_interface
    command: ["uv", "run", "uvicorn", "interface.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/ana_v2
      - SCRAPER_URL=http://edge-scraper:8001
      - STORE_URL=http://edge-store:8002
    depends_on:
      rabbitmq:
        condition: service_healthy

  core-controller:
    build: .
    container_name: ana_core_controller
    command: ["uv", "run", "faststream", "run", "controller.main:app"]
    restart: on-failure # <-- ADD THIS LINE
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/ana_v2
    depends_on:
      rabbitmq:
        condition: service_healthy

  core-actor:
    build: .
    container_name: ana_core_actor
    command: ["uv", "run", "faststream", "run", "actor.main:app"]
    restart: on-failure # <-- ADD THIS LINE
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/ana_v2
    depends_on:
      rabbitmq:
        condition: service_healthy

  core-memory:
    build: .
    container_name: ana_core_memory
    command: ["uv", "run", "faststream", "run", "memory.main:app"]
    restart: on-failure # <-- ADD THIS LINE
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/ana_v2
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=ana_admin
      - POSTGRES_PASSWORD=ana_password
      - POSTGRES_DB=ana_db
    depends_on:
      rabbitmq:
        condition: service_started
